name: PowerShell Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare PowerShell Gallery and Install PSScriptAnalyzer
        shell: powershell
        run: |
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072 -bor 12288
          if (-not (Get-PSRepository -Name "PSGallery" -ErrorAction SilentlyContinue)) {
              Register-PSRepository -Default -ErrorAction SilentlyContinue
          }
          Set-PSRepository -Name "PSGallery" -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Run PSScriptAnalyzer with Custom Settings
        shell: powershell
        run: |
          # Procura todos os ficheiros .ps1 recursivamente na pasta 'scripts'
          # e re-grava-os garantindo o encoding UTF-8 com BOM (utf8)
          Get-ChildItem -Path "scripts" -Filter "*.ps1" -Recurse | ForEach-Object {
              $Content = Get-Content -Path $_.FullName -Raw
              $Content | Out-File -FilePath $_.FullName -Encoding utf8 -Force
          }

          # Executa o linter aplicando o teu ficheiro de configurações personalizado
          [array]$issues = Invoke-ScriptAnalyzer -Path "scripts" -Recurse -Settings ".\.github\PSScriptAnalyzerSettings.psd1"

          if ($issues.Count -gt 0) {
              foreach ($issue in $issues) {
                  Write-Output "[$($issue.Severity)] No arquivo: $($issue.ScriptName) (Linha $($issue.Line)): $($issue.Message) [Regra: $($issue.RuleName)]"
              }
              Write-Error "Foram encontrados problemas no codigo listados acima."
              exit 1
          }
